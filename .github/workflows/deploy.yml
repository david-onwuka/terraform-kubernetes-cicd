name: Terraform Kubernetes CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  terraform-validation:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3


      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check


      - name: Terraform Init
        working-directory: terraform
        run: terraform init


      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate



  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Build Docker Image
        working-directory: app
        run: |
          docker build -t terraform-k8s-app:test .



  kubernetes-validation:
    name: Kubernetes Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Validate Kubernetes Terraform Configuration
        working-directory: terraform
        run: |
          echo "Checking Kubernetes Terraform configuration"
          terraform init
          terraform validate



  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      - terraform-validation
      - docker-build
      - kubernetes-validation

    steps:
      - name: Success Message
        run: |
          echo "Terraform validation completed"
          echo "Docker build completed"
          echo "Kubernetes validation completed"
          echo "CI/CD pipeline finished successfully"
